# Change the prefix key from 'Ctrl-b' to 'Ctrl-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Enable mouse support (allows clicking panes, resizing, and scrolling)
set -g mouse on

# Start window and pane numbering at 1 instead of 0 (easier to reach on keyboard)
set -g base-index 1
setw -g pane-base-index 1

# Split panes using intuitive symbols (| for vertical, - for horizontal)
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Quick shortcut to reload the config (Prefix + r)
bind r source-file ~/.tmux.conf \; display-message "Tmux config reloaded!"
